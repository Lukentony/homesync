# Security headers HomeSync — inclusi sia a livello server sia in OGNI location
# con un proprio add_header: nginx NON eredita gli add_header del livello
# superiore quando la location ne definisce di propri (gotcha noto).
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "same-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
# NB: React/React-DOM/Babel sono vendorizzati in /vendor/ →
# script-src 'self' 'unsafe-inline' 'unsafe-eval'
# permetterebbe una CSP più stretta (miglioria per il repo pubblico).
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'
