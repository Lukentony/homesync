    /* Tap/click feel */

    input[type=range]::-moz-range-thumb {

    /* Keyframe animations */

  <script>
    // Aggiornamento service worker robusto. Gira PRIMA di React, cosi' recupera
    // anche quando l'app (vecchia cache) va in errore: forza il check di una
    // nuova versione del SW e RICARICA quando il nuovo SW prende il controllo.
    // Guard anti-loop. Risolve "errore di caricamento" sull'app installata dopo un deploy.
    (function () {
      if (!('serviceWorker' in navigator)) return;
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing) return; refreshing = true;
        window.location.reload();
      });
      navigator.serviceWorker.register('/sw.js')
        .then(function (reg) { try { reg.update(); } catch (e) {} })
        .catch(function () {});
    })();
  </script>

      if (el && el.parentNode) {

// ─── Helpers ────────────────────────────────────────────────────────────────

function roomIcon(iconId) {
  const name = (iconId || '').split(':')[0];
  const MAP = {
    Utensils: 'kitchen', Bath: 'bath', BedDouble: 'bed',
    Sofa: 'sofa', WashingMachine: 'washing', Flower2: 'flower',
    utensils: 'kitchen', kitchen: 'kitchen', bath: 'bath', bed: 'bed',
    sofa: 'sofa', washing: 'washing', flower: 'flower',
  };
  return MAP[name] || 'layers';
}

// roomStats is exported to window by lib/screens.jsx — no need to redefine here.
// roomIcon must be on window for lib/settings.jsx to find it at render time.
window.roomIcon = roomIcon;

function getNextDayOfWeek(baseDate, daysOfWeek) {
  if (!daysOfWeek || daysOfWeek.length === 0) return baseDate;
  const sortedDays = [...daysOfWeek].sort((a, b) => a - b);
  let nextDate = new Date(baseDate.getTime());
  nextDate.setHours(0, 0, 0, 0);
  const currentDay = nextDate.getDay(); // 0 (Dom) - 6 (Sab)
  
  let targetDay = sortedDays.find(d => d > currentDay);
  
  if (targetDay === undefined) {
    targetDay = sortedDays[0];
    const diff = (7 - currentDay) + targetDay;
    nextDate.setDate(nextDate.getDate() + diff);
  } else {
    const diff = targetDay - currentDay;
    nextDate.setDate(nextDate.getDate() + diff);
  }
  return nextDate;
}
window.getNextDayOfWeek = getNextDayOfWeek;

function dueStringToDate(str) {
  const d = new Date();
  d.setHours(0,0,0,0);
  if (str === 'ieri') {
    d.setDate(d.getDate() - 1);
  } else if (str === 'oggi') {
    // oggi
  } else if (str === 'domani') {
    d.setDate(d.getDate() + 1);
  } else {
    const match = String(str).match(/tra (\d+)g/);
    if (match) {
      d.setDate(d.getDate() + parseInt(match[1], 10));
    }
  }
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
window.dueStringToDate = dueStringToDate;

// Notifica locale compatibile con mobile. Su Android `new Notification()` lancia
// "Illegal constructor": va usato il service worker (showNotification). Fallback al
// costruttore solo su desktop senza SW. Non deve MAI far crashare il chiamante.
function showLocalNotification(title, options) {
  try {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
      navigator.serviceWorker.ready
        .then(function (reg) { return reg.showNotification(title, options); })
        .catch(function () { try { new Notification(title, options); } catch (e) {} });
    } else {
      try { new Notification(title, options); } catch (e) {}
    }
  } catch (e) { /* notifica best-effort */ }
}
window.showLocalNotification = showLocalNotification;

// I promemoria mattina/sera sono gestiti SOLO dal push server-side
// (logic/scheduler.py, orari per utente in Impostazioni → Notifiche),
// che funziona anche ad app chiusa. Qui restava un secondo sistema
// client-side duplicato che girava solo ad app aperta, con orari propri
// non configurabili da UI e un bug di conteggio (contava tutti i task
// attivi della casa invece di quelli in scadenza oggi) — rimosso il
// 2026-07-06. Resta solo la notifica "task in scadenza", che non duplica
// nulla lato server e fornisce un feedback immediato mentre l'app è aperta.
function checkAndSendNotifications(taskList, notifyPrefs) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  if (!notifyPrefs) return;
  if (!notifyPrefs.dueSoon) return;

  const todayStr = new Date().toISOString().slice(0, 10);

  const dueTasks = taskList.filter(t => {
    if (t.completed) return false;
    if (t.next_due_date) {
      return t.next_due_date <= todayStr;
    }
    return t.urgency === 'overdue' || t.due === 'oggi' || t.due === 'ieri';
  });

  if (dueTasks.length > 0) {
    const lastNotifiedDue = localStorage.getItem('hs-last-notified-due-date');
    const dueTasksIds = dueTasks.map(t => t.id).sort().join(',');
    const lastNotifiedDueIds = localStorage.getItem('hs-last-notified-due-ids');

    if (lastNotifiedDue !== todayStr || lastNotifiedDueIds !== dueTasksIds) {
      localStorage.setItem('hs-last-notified-due-date', todayStr);
      localStorage.setItem('hs-last-notified-due-ids', dueTasksIds);

      const names = dueTasks.slice(0, 3).map(t => t.name).join(', ');
      const count = dueTasks.length;
      const bodyText = count > 3
        ? `${names} e altri ${count - 3} task sono in scadenza!`
        : `${names} da completare!`;

      showLocalNotification('HomeSync — Task in scadenza', {
        body: bodyText,
        icon: '/favicon.png',
        tag: 'homesync-due',
      });
    }
  }
}

// Fallback offline (il backend è l'unica fonte di verità quando risponde):
// task.points è già la preview corretta calcolata in loadData, che incorpora
// la regola di ritardo (1g -> base 1, >1g -> stesso importo ma negativo).
function calcPoints(task, scoring) {
  return task.points ?? (task.difficulty || 3) * (scoring?.base || 10);
}

// TaskCard — dispatches to variant
function TaskCard({ variant = 'tap', task, room, assignee, onComplete, onOpen }) {
  if (variant === 'swipe') return <TaskCardSwipe task={task} room={room} assignee={assignee} onComplete={onComplete} onOpen={onOpen} />;
  if (variant === 'hold')  return <TaskCardHold  task={task} room={room} assignee={assignee} onComplete={onComplete} onOpen={onOpen} />;
  return <TaskCardTap task={task} room={room} assignee={assignee} onComplete={onComplete} onOpen={onOpen} />;
}

// ─── Toast system ────────────────────────────────────────────────────────────
const ToastContext = React.createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = React.useState([]);

  const showToast = React.useCallback((message, type = 'success', duration = 2800) => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => {
      setToasts(prev => prev.filter(t => t.id !== id));
    }, duration);
  }, []);

  return (
    <ToastContext.Provider value={showToast}>
      {children}
      <div style={{
        position: 'fixed', bottom: `calc(80px + env(safe-area-inset-bottom))`,
        left: '50%', transform: 'translateX(-50%)',
        display: 'flex', flexDirection: 'column-reverse', gap: 8,
        zIndex: 100, pointerEvents: 'none',
        width: 'calc(100% - 40px)', maxWidth: 360,
      }}>
        {toasts.map(t => (
          <div key={t.id} style={{
            background: t.type === 'error' ? '#D94B4B' : t.type === 'warning' ? '#E0A93A' : '#2A1D14',
            color: '#fff',
            padding: '12px 18px',
            borderRadius: 14,
            fontFamily: HS.fontUI, fontSize: 14, fontWeight: 600,
            boxShadow: '0 8px 24px rgba(42,29,20,.25)',
            display: 'flex', alignItems: 'center', gap: 10,
            animation: 'hs-toast-in .22s ease',
            pointerEvents: 'auto',
          }}>
            <span style={{ fontSize: 18 }}>
              {t.type === 'error' ? '⚠️' : t.type === 'warning' ? '⏰' : '✓'}
            </span>
            {t.message}
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

function useToast() {
  return React.useContext(ToastContext);
}

// ─── Error Boundary ──────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(err) { return { error: err }; }
  componentDidCatch(err, info) { console.error('[HomeSync]', err, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{
          padding: 32, textAlign: 'center',
          fontFamily: HS?.fontUI || 'Inter, sans-serif',
        }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🏚️</div>
          <div style={{ fontSize: 20, fontWeight: 700, color: '#2A1D14', marginBottom: 8 }}>
            Qualcosa è andato storto
          </div>
          <div style={{ fontSize: 13, color: '#9E8572', marginBottom: 24 }}>
            {this.state.error?.message || 'Errore sconosciuto'}
          </div>
          <button
            onClick={() => this.setState({ error: null })}
            style={{
              padding: '12px 24px', border: 'none', borderRadius: 12,
              background: '#E2743A', color: '#fff',
              fontWeight: 700, fontSize: 14, cursor: 'pointer',
            }}
          >Riprova</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ─── LS persistence ──────────────────────────────────────────────────────────
const LS_KEY = 'hs-state';

function loadState() {
  try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : null; }
  catch { return null; }
}
function saveState(s) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch {}
}

// ─── Login Screen ─────────────────────────────────────────────────────────────
function LoginScreen({ onLoginSuccess }) {
  const [users, setUsers] = React.useState([]);
  const [selectedUser, setSelectedUser] = React.useState(null);
  const [pin, setPin] = React.useState('');
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const showToast = useToast();

  React.useEffect(() => {
    if (window.HS_API && window.HS_API.listUsers) {
      window.HS_API.listUsers()
        .then(res => setUsers(res))
        .catch(err => {
          console.warn("Failed to load users for picker, using fallback", err);
          setUsers([
            { id: 1, name: 'Utente A', emoji: '🦦', color: '#E2743A' },
            { id: 2, name: 'Utente B', emoji: '🐢', color: '#6F9E7A' }
          ]);
        });
    }
  }, []);

  const handleKeyPress = (num) => {
    setError('');
    if (pin.length < 4) {
      const nextPin = pin + num;
      setPin(nextPin);
      if (nextPin.length === 4) {
        handleLogin(nextPin);
      }
    }
  };

  const handleBackspace = () => {
    setError('');
    setPin(prev => prev.slice(0, -1));
  };

  const handleLogin = (pinToSubmit) => {
    if (!selectedUser) return;
    setLoading(true);
    window.HS_API.login(selectedUser.id, pinToSubmit)
      .then(res => {
        setLoading(false);
        if (res && res.session_token) {
          // Salva id utente loggato
          localStorage.setItem('hs-me-id', String(res.user_id));
          showToast(`Bentornato, ${res.user_name}!`);
          onLoginSuccess(res.session_token);
        } else {
          setError('PIN errato o non valido');
          setPin('');
        }
      })
      .catch(err => {
        setLoading(false);
        setError(err.detail || 'PIN errato o connessione fallita');
        setPin('');
      });
  };

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 999,
      background: '#FBF6EE', display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', padding: 24,
      fontFamily: 'Inter, sans-serif'
    }}>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, marginBottom: 32 }}>
        <div style={{
          width: 64, height: 64, borderRadius: 20,
          background: '#E2743A', color: '#fff',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: 'Fraunces, serif', fontSize: 34, fontWeight: 600,
          boxShadow: '0 8px 24px rgba(226,116,58,.3)'
        }}>H</div>
        <div style={{ fontFamily: 'Fraunces, serif', fontSize: 24, fontWeight: 600, color: '#2A1D14' }}>HomeSync</div>
        <div style={{ fontSize: 13, color: '#9E8572' }}>Chi sta usando l'app?</div>
      </div>

      {!selectedUser ? (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16, width: '100%', maxWidth: 300 }}>
          {users.map(u => (
            <button
              key={u.id}
              onClick={() => {
                // Tenta il login con PIN vuoto: se l'utente non ha un PIN
                // impostato il backend risponde success subito (uso
                // domestico senza PIN). Se invece un PIN e' configurato,
                // il backend risponde 401 ("PIN non valido") - in quel
                // caso NON si torna al selettore, si mostra il tastierino
                // PIN (selectedUser resta impostato): prima andava sempre
                // in errore silenzioso e tornava alla lista, rendendo
                // impossibile accedere a un utente con PIN impostato.
                setSelectedUser(u);
                setLoading(true);
                setError('');
                window.HS_API.login(u.id, '')
                  .then(res => {
                    setLoading(false);
                    if (res && res.session_token) {
                      localStorage.setItem('hs-me-id', String(res.user_id));
                      showToast(`Bentornato, ${res.user_name}!`);
                      onLoginSuccess(res.session_token);
                    } else {
                      setError('Inserisci il tuo PIN');
                    }
                  })
                  .catch(err => {
                    setLoading(false);
                    const needsPin = /HTTP 401/.test(err && err.message || '');
                    setError(needsPin ? 'Inserisci il tuo PIN' : 'Connessione fallita');
                    if (!needsPin) setSelectedUser(null);
                  });
              }}
              style={{
                display: 'flex', alignItems: 'center', gap: 14,
                padding: '16px 20px', borderRadius: 16, border: '1px solid #EDE8E0',
                background: '#fff', boxShadow: '0 2px 8px rgba(42,29,20,.03)',
                textAlign: 'left', outline: 'none'
              }}
            >
              <div style={{
                width: 44, height: 44, borderRadius: 12, background: u.color + '22',
                display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24
              }}>{u.emoji || '👤'}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 16, color: '#2A1D14' }}>{u.name}</div>
                <div style={{ fontSize: 12, color: '#9E8572' }}>Seleziona per accedere</div>
              </div>
            </button>
          ))}
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', width: '100%', maxWidth: 320 }}>
          <button
            onClick={() => { setSelectedUser(null); setPin(''); setError(''); }}
            style={{
              background: 'none', border: 'none', color: '#9E8572', fontSize: 13,
              fontWeight: 600, marginBottom: 20, display: 'flex', alignItems: 'center', gap: 4
            }}
          >
            ← Cambia utente
          </button>
          
          <div style={{ fontSize: 18, fontWeight: 600, color: '#2A1D14', marginBottom: 6 }}>Ciao, {selectedUser.name}!</div>
          <div style={{ fontSize: 13, color: '#9E8572', marginBottom: 24 }}>Inserisci il tuo PIN di sicurezza</div>

          <div style={{ display: 'flex', gap: 16, marginBottom: 24 }}>
            {[0, 1, 2, 3].map(i => (
              <div
                key={i}
                style={{
                  width: 16, height: 16, borderRadius: '50%',
                  border: '2px solid #E2743A',
                  background: pin.length > i ? '#E2743A' : 'transparent',
                  transition: 'background-color 0.15s ease'
                }}
              />
            ))}
          </div>

          {error && <div style={{ color: '#D94B4B', fontSize: 13, fontWeight: 600, marginBottom: 20 }}>{error}</div>}

          <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12,
            width: '100%', padding: '0 16px'
          }}>
            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
              <button
                key={num}
                onClick={() => handleKeyPress(String(num))}
                disabled={loading}
                style={{
                  height: 60, borderRadius: 16, border: 'none',
                  background: '#fff', color: '#2A1D14', fontSize: 20, fontWeight: 600,
                  boxShadow: '0 2px 6px rgba(42,29,20,.04)', display: 'flex',
                  alignItems: 'center', justifyContent: 'center'
                }}
              >{num}</button>
            ))}
            <button
              onClick={() => handleKeyPress('0')}
              disabled={loading}
              style={{
                gridColumn: '2', height: 60, borderRadius: 16, border: 'none',
                background: '#fff', color: '#2A1D14', fontSize: 20, fontWeight: 600,
                boxShadow: '0 2px 6px rgba(42,29,20,.04)', display: 'flex',
                alignItems: 'center', justifyContent: 'center'
              }}
            >0</button>
            <button
              onClick={handleBackspace}
              disabled={loading}
              style={{
                gridColumn: '3', height: 60, borderRadius: 16, border: 'none',
                background: '#FFEAEA', color: '#D94B4B', fontSize: 18, fontWeight: 600,
                boxShadow: '0 2px 6px rgba(42,29,20,.04)', display: 'flex',
                alignItems: 'center', justifyContent: 'center'
              }}
            >⌫</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [sessionToken, setSessionToken] = React.useState(localStorage.getItem('hs-session-token'));
  const showToast = useToast();
  const saved = React.useMemo(() => loadState(), []);

  // ── Core data ──
  const [tasks, setTasksBase]       = React.useState([]);
  const [completed, setCompBase]    = React.useState(saved?.completed || MOCK.history || []);
  const [vacation, setVacBase]      = React.useState(saved?.vacation  ?? false);
  const [rooms, setRoomsBase]       = React.useState(saved?.rooms     || MOCK.rooms || []);
  const [members, setMembersBase]   = React.useState(saved?.members   || MOCK.users || []);
  const [scoring, setScoringBase]   = React.useState(saved?.scoring   || { base: 3, overdueBonus: 1, streakBonus: 5, splitShared: true, weeklyReset: true });
  const [notifyPrefs, setNotifBase] = React.useState(saved?.notifyPrefs || { dueSoon: true, partnerDone: false });
  const [prefs, setPrefsBase]       = React.useState(saved?.prefs     || { show_urgency_colors: 'true', early_completion_days: '2', grace_period_days: '1' });
  const loadDataRef = React.useRef(null);

  // ── UI state ──
  const [activeTab, setActiveTab]     = React.useState('today');
  // Layout e completamento fissi in produzione: quadrante + tocco.
  // (I selettori in Impostazioni sono stati rimossi; ignoriamo i valori salvati.)
  const homeMode = 'dial';
  const cardVariant = 'tap';
  const [drawer, setDrawer]           = React.useState(false);
  const [quickAdd, setQuickAdd]       = React.useState(false);
  const [taskDetail, setTaskDetail]   = React.useState(null);
  const [whoDidIt, setWhoDidIt]       = React.useState(null);
  const [memberEdit, setMemberEdit]   = React.useState(null);
  const [inviteOpen, setInviteOpen]   = React.useState(false);
  const [notifSaveState, setNSS]      = React.useState(null);

  // ── History API / Tasto Indietro (Back Button) ──
  React.useEffect(() => {
    const handlePopState = (e) => {
      if (taskDetail) { setTaskDetail(null); return; }
      if (whoDidIt) { setWhoDidIt(null); return; }
      if (quickAdd) { setQuickAdd(false); return; }
      if (memberEdit) { setMemberEdit(null); return; }
      if (inviteOpen) { setInviteOpen(false); return; }
      if (drawer) { setDrawer(false); return; }

      if (activeTab === 'today') {
        if (confirm("Vuoi uscire dall'applicazione?")) {
          window.close();
        } else {
          history.pushState({ root: true }, '');
        }
      } else {
        setActiveTab('today');
        history.pushState({ root: true }, '');
      }
    };

    window.addEventListener('popstate', handlePopState);
    if (!history.state) {
      history.replaceState({ root: true }, '');
    }
    return () => window.removeEventListener('popstate', handlePopState);
  }, [drawer, quickAdd, taskDetail, whoDidIt, memberEdit, inviteOpen, activeTab]);

  React.useEffect(() => {
    const anyOpen = !!(drawer || quickAdd || taskDetail || whoDidIt || memberEdit || inviteOpen);
    if (anyOpen) {
      if (!history.state || !history.state.overlay) {
        history.pushState({ overlay: true }, '');
      }
    }
  }, [drawer, quickAdd, taskDetail, whoDidIt, memberEdit, inviteOpen]);

  const isDesktop = typeof window !== 'undefined' && window.innerWidth > 1100;

  // ── Persistent setters ──
  const mkState = (overrides) => ({
    tasks, completed, vacation, rooms, members, scoring, notifyPrefs, prefs,
    homeMode, cardVariant,
    ...overrides,
  });
  function setTasks(v)       { setTasksBase(v);   saveState(mkState({ tasks: v })); }
  function setCompleted(v)   { setCompBase(v);    saveState(mkState({ completed: v })); }
  function setVacation(v)    {
    setVacBase(v);
    saveState(mkState({ vacation: v }));
    // Persisti sul backend: senza questa chiamata il toggle cambiava solo
    // lo stato locale (localStorage), la modalità vacanza vera (che mette
    // in pausa le notifiche e riallinea le scadenze al rientro) non veniva
    // mai attivata sul server.
    window.HS_API.setVacation(v).catch(function(e) { console.error('HS setVacation fail', e); });
  }
  function setRooms(v)       { setRoomsBase(v);   saveState(mkState({ rooms: v })); }
  function setMembers(v)     { setMembersBase(v); saveState(mkState({ members: v })); }
  function setScoring(v)     { setScoringBase(v); saveState(mkState({ scoring: v })); }
  function setPrefs(v)       { setPrefsBase(v);   saveState(mkState({ prefs: v })); }
  function setNotifyPrefs(v) {
    const next = typeof v === 'function' ? v(notifyPrefs) : v;
    setNotifBase(next);
    setNSS('saving');
    setTimeout(() => { setNSS('saved'); setTimeout(() => setNSS(null), 2000); }, 600);
    saveState(mkState({ notifyPrefs: next }));
  }

  React.useEffect(() => {
    const el = document.getElementById('hs-loading');
    if (el) {
      el.style.transition = 'opacity .3s ease';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 350);
    }
  }, []);

  // ── PWA install prompt ──
  const [installPrompt, setInstallPrompt] = React.useState(null);
  const [showInstall, setShowInstall]     = React.useState(false);
  React.useEffect(() => {
    const handler = (e) => { e.preventDefault(); setInstallPrompt(e); setShowInstall(true); };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  // ── Notification permission ──
  React.useEffect(() => {
    if ('Notification' in window && Notification.permission === 'default') {
      const tid = setTimeout(() => {
        Notification.requestPermission().catch(() => {});
      }, 2000);
      return () => clearTimeout(tid);
    }
  }, []);

  // ── Service Worker registration ──
  React.useEffect(() => {
    if ('serviceWorker' in navigator) {
      // Registrazione + check aggiornamenti. Il RELOAD su nuova versione e'
      // gestito dallo script inline early (controllerchange) in <body>, che
      // funziona anche se React non monta. Qui solo registrazione (idempotente).
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.info('[HomeSync] SW registrato:', reg.scope);
        try { reg.update(); } catch (e) {}
      }).catch(err => {
        console.warn('[HomeSync] SW fallito:', err);
      });
    }
  }, []);

  // ── Local Notifications Triggers ──
  React.useEffect(() => {
    if (tasks && tasks.length > 0) {
      checkAndSendNotifications(tasks, notifyPrefs);
    }
  }, [tasks, notifyPrefs]);

  React.useEffect(() => {
    const interval = setInterval(() => {
      if (tasks && tasks.length > 0) {
        checkAndSendNotifications(tasks, notifyPrefs);
      }
    }, 30000);
    return () => clearInterval(interval);
  }, [tasks, notifyPrefs]);

  React.useEffect(() => {
    let cancelled = false;
    async function loadData() {
      try {
        const [roomsRes, tasksRes, qaRes, usersRes, lbRes, scoringBaseRes, settingsRes] = await Promise.all([
          window.HS_API.listRooms().catch(() => []),
          window.HS_API.listTasks().catch(() => []),
          window.HS_API.getQuickActions ? window.HS_API.getQuickActions().catch(() => []) : Promise.resolve([]),
          window.HS_API.listUsers().catch(function(){ return window.HS_CFG ? window.HS_CFG.users : []; }),
          window.HS_API.leaderboard().catch(() => ({ leaderboard: [] })),
          window.HS_API.getScoringBase ? window.HS_API.getScoringBase().catch(() => null) : Promise.resolve(null),
          window.HS_API.getSettings ? window.HS_API.getSettings().catch(() => []) : Promise.resolve([]),
        ]);
        if (scoringBaseRes && scoringBaseRes.base) {
          setScoringBase(function(prev) { return { ...prev, base: scoringBaseRes.base }; });
        }
        if (cancelled) return;
        // Modalità vacanza: il backend è l'unica fonte di verità (condivisa
        // tra i due dispositivi). setVacBase, non setVacation, per non
        // ri-scrivere subito quello che si è appena letto.
        if (Array.isArray(settingsRes)) {
          var vacSetting = settingsRes.find(function(s) { return s.key === 'vacation_mode'; });
          if (vacSetting) setVacBase(vacSetting.value === 'true');
        }
        // Mappa stanze backend in formato frontend
        var rooms = roomsRes.map(function(r) {
          var icons = { Utensils: 'Utensils', Bath: 'Bath', Sofa: 'Sofa', BedDouble: 'BedDouble', WashingMachine: 'WashingMachine', Flower2: 'Flower2' };
          var defaultColors = { Utensils: '#E2743A', Bath: '#6F9E7A', Sofa: '#E0A93A', BedDouble: '#8C5AC8', WashingMachine: '#D94B4B', Flower2: '#6F9E7A' };
          
          var iconPart = r.icon || 'Sofa';
          var colorPart = '#E2743A';
          if (iconPart.indexOf(':') !== -1) {
            var parts = iconPart.split(':');
            iconPart = parts[0];
            colorPart = parts[1];
          } else {
            colorPart = defaultColors[iconPart] || '#E2743A';
          }
          
          return {
            id: (r.name||'').toLowerCase().replace(/[^a-z0-9]/g,'_') || 'room',
            _backendId: r.id,
            name: r.name,
            icon: icons[iconPart] || iconPart || 'Sofa',
            pct: Math.round(r.completion_percentage || 0),
            total: 0,
            done: 0,
            color: colorPart
          };
        });
        // Mappa task backend in formato frontend
        var sb = (scoringBaseRes && scoringBaseRes.base) ? scoringBaseRes.base : (scoring ? scoring.base : 10);
        var today = new Date(); today.setHours(0,0,0,0);
        var regularTasks = tasksRes.map(function(t) {
          var room = roomsRes.find(function(r) { return r.id === t.room_id; });
          var roomKey = room ? (room.name||'').toLowerCase().replace(/[^a-z0-9]/g,'_') : 'room';
          
          // Estraiamo stanze multiple dai tags
          var roomIds = [t.room_id];
          if (t.tags) {
            try {
              var parsedTags = JSON.parse(t.tags);
              if (Array.isArray(parsedTags)) {
                parsedTags.forEach(function(tag) {
                  var clean = String(tag).replace(/^room:/, '');
                  if (/^\d+$/.test(clean)) {
                    var rid = parseInt(clean, 10);
                    if (!roomIds.includes(rid)) roomIds.push(rid);
                  }
                });
              }
            } catch(e) {}
          }
          
          var roomKeys = roomIds.map(function(rid) {
            var r = roomsRes.find(function(rm) { return rm.id === rid; });
            return r ? (r.name||'').toLowerCase().replace(/[^a-z0-9]/g,'_') : null;
          }).filter(Boolean);
          
          if (roomKeys.length === 0) roomKeys = [roomKey];

          var dueDate = t.next_due_date || t.instance_date;
          var d = dueDate ? Math.round((new Date(dueDate+'T00:00:00') - today) / 86400000) : 99;
          var urgency = d < 0 ? 'overdue' : d === 0 ? 'urgent' : d <= 3 ? 'soon' : 'ok';
          var dueLabel = d < -1 ? (-d)+'g fa' : d === -1 ? 'ieri' : d === 0 ? 'oggi' : d === 1 ? 'domani' : 'tra '+d+'g';
          var assignee;
          switch(t.assignment_type) {
            case 'FIXED_A': assignee = 1; break;
            case 'FIXED_B': assignee = 2; break;
            case 'TOGETHER': assignee = 'both'; break;
            case 'ALTERNATING': assignee = t.last_performer_id === 1 ? 2 : 1; break;
            default: assignee = 1;
          }
          // Anteprima punti coerente con la regola del backend (complete_task):
          // 1g di ritardo -> valore base a 1 (p ridotto). Oltre 1g -> NON ridotto:
          // stesso valore che si guadagnerebbe puntuale (difficoltà * scoring_base
          // normale), ma sottratto: -(p * d), non -(1 * d).
          var previewPoints;
          if (d === -1) previewPoints = (t.difficulty || 3) * 1;
          else if (d < -1) previewPoints = -((t.difficulty || 3) * sb);
          else previewPoints = (t.difficulty || 3) * sb;
           return { id: 't'+t.id + (t.instance_date ? '_'+t.instance_date : ''), _backendId: t.id, name: t.name, room: roomKey, rooms: roomKeys, roomIds: roomIds, roomId: t.room_id, due: dueLabel, urgency: urgency, assignee: assignee, everyDays: t.frequency_days, next_due_date: dueDate, difficulty: t.difficulty || 3, points: previewPoints, tags: t.tags, is_quick_action: false, has_history: !!t.has_history, has_occurrence_override: !!t.has_occurrence_override, skipped_occurrences: t.skipped_occurrences || [] };
        });
        // Aggiungi quick actions all'array tasks con flag is_quick_action: true
        var qaTasks = (qaRes || []).map(function(t) {
          return { id: 'qa'+t.id, _backendId: t.id, name: t.name, room: 'cucina', rooms: ['cucina'], roomIds: [t.room_id || 1], roomId: t.room_id || 1, due: '', urgency: 'ok', assignee: 'both', everyDays: 9999, next_due_date: '9999-12-31', difficulty: t.difficulty || 2, points: (t.difficulty || 2) * sb, tags: t.tags, is_quick_action: true };
        });
        var tasks = regularTasks.concat(qaTasks);

        // Mappa utenti
        var lb = (lbRes && lbRes.leaderboard) || [];
        var users = usersRes.map(function(u) {
          var e = lb.find(function(x) { return x.user_id === u.id; }) || {};
          return { id: u.id, name: u.name, emoji: u.emoji || '👤', color: u.color || '#888', weekly: e.weekly_points || 0, total: u.total_points || 0, streak: 0 };
        });
        setRoomsBase(rooms); setTasksBase(tasks); setMembersBase(users);
        window.MOCK.users = users; window.MOCK.rooms = rooms;
        // Ordina utenti con corrente al primo posto
        var me = window.HS_API ? window.HS_API.getMe() : null;
        if (me && window.MOCK.users.length > 1 && window.MOCK.users[0].id !== me) {
          var idx = window.MOCK.users.findIndex(function(u) { return u.id === me; });
          if (idx > 0) { window.MOCK.users = [window.MOCK.users[idx]].concat(window.MOCK.users.filter(function(u, j) { return j !== idx; })); }
        }
      } catch(e) { console.warn('[HS] loadData fail', e); }
    }
    loadDataRef.current = loadData;
    loadData();
    const tid = setInterval(loadData, 30000);
    return () => { cancelled = true; clearInterval(tid); };
  }, []);
  // ── History dal backend ──
  // Dipende anche da 'members' (non solo sessionToken): la lookup nome->id
  // usa la lista utenti reale, che arriva da un fetch asincrono separato
  // (loadData). Se questo effetto girasse prima che 'members' sia popolato,
  // la lookup fallirebbe silenziosamente e attribuirebbe il completamento
  // sempre all'id 1 di default — bug di race condition, corretto qui
  // ri-eseguendo il mapping quando la lista utenti si aggiorna davvero.
  React.useEffect(function() {
    if (!sessionToken || !members || members.length === 0) return;
    window.HS_API.history(90).then(function(data) {
      if (!Array.isArray(data)) return;
      var mapped = data.map(function(c) {
        var u = members.find(function(x) { return x.name === c.user_name; });
        return {
          id: 'c' + c.id,
          _completionId: c.id,
          _backendId: c.task_id,
          name: c.task_name,
          completedBy: c.was_shared ? 'both' : (u ? u.id : 1),
          completedAt: new Date(c.completed_at).getTime(),
          awardedPoints: c.points_awarded,
          points: c.points_awarded,
        };
      });
      setCompBase(mapped);
    }).catch(function() {});
  }, [sessionToken, members]);

  // ── Haptic feedback helper ──
  const vibrate = (pattern = [20]) => {
    if ('vibrate' in navigator) navigator.vibrate(pattern);
  };

  // ── Task completion ──
  function handleComplete(task) {
    if (task.assignee === 'both') { setWhoDidIt(task); return; }
    doComplete(task, task.assignee);
  }

  async function doComplete(task, completedBy) {
    var bid=task._backendId||parseInt(String(task.id).replace(/^t/,"",10));
    var backendPts = null;
    if(bid){
      var completePayload = {
        use_theoretical_date: false,
        user_id: (completedBy === 'both') ? null : completedBy
      };
      if (task.instance_date) completePayload.instance_date = task.instance_date;
      try {
        // Il backend crea il completamento, calcola i punti e avanza la scadenza
        // secondo il tipo di ricorrenza del task (giorni fissi o intervallo).
        // Il client NON ricalcola nulla: niente updateTask (corrompeva la
        // difficolta') ne' points_awarded (divergeva dal backend).
        const res = await window.HS_API.completeTask(bid, completePayload);
        if (res && typeof res.points === 'number') backendPts = res.points;
        if (loadDataRef.current) loadDataRef.current();
      } catch(e) {
        console.error('HS complete fail', e);
      }
    }
    // Punti mostrati = quelli decisi dal backend (incl. riduzione per ritardo).
    // Il calcolo locale resta solo come fallback offline. ceil(|pts|/2) poi
    // segno: Math.ceil su un valore già negativo arrotonderebbe nella
    // direzione sbagliata (stesso bug fixato in who-did-it.jsx).
    const pts = calcPoints(task, scoring);
    const sharedFallback = pts < 0 ? -Math.ceil(Math.abs(pts) / 2) : Math.ceil(pts / 2);
    const awardedPoints = backendPts !== null ? backendPts
      : (completedBy === 'both' && scoring.splitShared) ? sharedFallback : pts;
    const entry = { ...task, completedBy, completedAt: Date.now(), awardedPoints };

    // Update MOCK.users points
    if (completedBy === 'both') {
      MOCK.users.forEach(u => { u.weekly = (u.weekly || 0) + awardedPoints; u.total = (u.total || 0) + awardedPoints; });
    } else {
      const u = MOCK.users.find(x => x.id === completedBy);
      if (u) { u.weekly = (u.weekly || 0) + awardedPoints; u.total = (u.total || 0) + awardedPoints; }
    }

    // Ottimistic update: rimuovi l'istanza completata, il polling 30s rigenera dal backend
    var newTasks = tasks.filter(function(t) { return t.id !== task.id; });

    setTasks(newTasks);
    if (window.refreshInstances) window.refreshInstances(newTasks);
    setCompleted([entry, ...completed]);
    setWhoDidIt(null);

    vibrate([15, 30, 15]);
    const user = completedBy === 'both' ? 'Entrambi' : (MOCK.users.find(u => u.id === completedBy)?.name || '');
    // Ritardo >1g: il backend sottrae punti invece di assegnarli -> toast di warning, non di successo.
    const ptsLabel = (awardedPoints >= 0 ? '+' : '') + awardedPoints;
    showToast(`✓ ${task.name} — ${ptsLabel} pt`, awardedPoints < 0 ? 'warning' : 'success');

    // Notify partner
    if (notifyPrefs.partnerDone && 'Notification' in window && Notification.permission === 'granted') {
      showLocalNotification('HomeSync', { body: `${user} ha completato: ${task.name}` });
    }
  }

  async function handleUncomplete(entry) {
    const bid = entry._backendId || parseInt(String(entry.id).replace(/^t/, ''), 10);
    try {
      if (entry._completionId) {
        // Cancella esattamente il completamento cliccato, non "l'ultimo
        // completamento in assoluto per quel task" — bug corretto il
        // 2026-07-06: da Storico, annullare una voce non recentissima
        // cancellava un completamento diverso da quello selezionato.
        await window.HS_API.deleteHistoryItem(entry._completionId);
      } else if (bid) {
        // Fallback per l'annullamento immediato dopo il tap (l'entry
        // ottimistica locale non ha ancora un _completionId reale finche'
        // non arriva il prossimo refetch di /history).
        await window.HS_API.undoComplete(bid);
      }
    } catch(e) { showToast('Errore annullamento', 'error'); return; }
    setCompleted(completed.filter(c => !(c.id === entry.id && c.completedAt === entry.completedAt)));
    if (!tasks.find(t => t.id === entry.id)) {
      setTasks([{ ...entry, completed: false, urgency: 'ok' }, ...tasks]);
    }
    showToast('Task ripristinato', 'warning');
    if (loadDataRef.current) loadDataRef.current();
  }

  async function handleAddTask(taskData) {
    var rid = (function() {
      if (typeof taskData.roomId === 'number') return taskData.roomId;
      if (typeof taskData.room === 'number') return taskData.room;
      var slug = String(taskData.room || taskData.roomId || '').toLowerCase();
      for (var i = 0; i < MOCK.rooms.length; i++) {
        var r = MOCK.rooms[i];
        if (r.id === slug || (r.name || '').toLowerCase() === slug || (r.name || '').toLowerCase().replace(/[^a-z0-9]/g,'_') === slug) {
          return typeof r._backendId === 'number' ? r._backendId : r.id;
        }
      }
      return (MOCK.rooms[0] && MOCK.rooms[0]._backendId) || 1;
    })();
    var freq = (taskData.everyDays !== undefined) ? taskData.everyDays : (taskData.every !== undefined) ? taskData.every : 7;
    var roomSlug = (function() {
      for (var i = 0; i < MOCK.rooms.length; i++) {
        var r = MOCK.rooms[i];
        if ((r._backendId || r.id) == rid) return r.id;
      }
      return taskData.room || (MOCK.rooms[0] && MOCK.rooms[0].id) || 'cucina';
    })();
    const nd = taskData.initial_due_date || taskData.next_due_date
      || (window.dueStringToDate ? window.dueStringToDate(taskData.due || 'oggi') : new Date().toISOString().slice(0,10));

    var finalTags = taskData.tags;
    if (!finalTags) {
      finalTags = JSON.stringify(['room:' + rid]);
    }

    try {
      const created = await window.HS_API.createTask({
        name: taskData.name,
        room_id: rid,
        frequency_days: freq,
        assignment_type: taskData.assignee === "both" ? "TOGETHER" : taskData.assignee === 1 ? "FIXED_A" : "FIXED_B",
        difficulty: taskData.difficulty !== undefined ? taskData.difficulty : 3,
        initial_due_date: nd,
        is_quick_action: taskData.is_quick_action || false,
        tags: finalTags
      });
      
      var roomIds = [];
      if (created.tags) {
        try {
          var parsed = JSON.parse(created.tags);
          if (Array.isArray(parsed)) {
            parsed.forEach(function(tag) {
              if (String(tag).startsWith('room:')) {
                roomIds.push(parseInt(String(tag).replace('room:', ''), 10));
              }
            });
          }
        } catch(e) {}
      }
      if (roomIds.length === 0) roomIds = [rid];
      
      var roomKeys = roomIds.map(function(rId) {
        var r = MOCK.rooms.find(function(rm) { return rm.id === rId || rm._backendId === rId; });
        return r ? (r.name||'').toLowerCase().replace(/[^a-z0-9]/g,'_') : null;
      }).filter(Boolean);
      if (roomKeys.length === 0) roomKeys = [roomSlug];

      const newTask = {
        id: 't' + created.id,
        _backendId: created.id,
        name: created.name,
        room: roomSlug,
        rooms: roomKeys,
        roomIds: roomIds,
        roomId: rid,
        assignee: taskData.assignee || 'both',
        urgency: 'soon',
        due: taskData.due || 'oggi',
        next_due_date: created.next_due_date || nd,
        everyDays: created.frequency_days,
        points: (created.difficulty || 3) * (scoring?.base || 10),
        is_quick_action: created.is_quick_action,
        difficulty: created.difficulty || 3,
        tags: created.tags
      };
      
      const next = [newTask, ...tasks];
      setTasks(next);
      if (window.refreshInstances) window.refreshInstances(next);
      setQuickAdd(false);
      showToast(`"${taskData.name}" aggiunto`);
    } catch (e) {
      console.error('HS create fail', e);
      showToast('Errore creazione task', 'error');
    }
  }
  function handleUpdateTask(id, payload) {
    window.HS_API.updateTask(id, payload)
      .then(function() {
        if (loadDataRef.current) loadDataRef.current();
        showToast('Compito aggiornato!');
      })
      .catch(function(err) {
        console.error("Failed to update task", err);
        showToast('Errore aggiornamento compito', 'error');
      });
  }
  function handleSaveTask(draft, scope) {
    scope = scope || 'all';
    var bid=draft._backendId||parseInt(String(draft.id).replace(/^t/,"",10));
    if(bid){
      var rid = (function() {
        if (typeof draft.roomId === 'number') return draft.roomId;
        if (typeof draft.roomId === 'string' && /^\d+$/.test(draft.roomId)) return parseInt(draft.roomId, 10);
        var slug = String(draft.room || draft.roomId || '').toLowerCase();
        for (var i = 0; i < MOCK.rooms.length; i++) {
          var r = MOCK.rooms[i];
          if (r.id === slug || (r.name || '').toLowerCase() === slug) {
            return typeof r._backendId === 'number' ? r._backendId : r.id;
          }
        }
        var staticRooms = { cucina:1, bagno:2, soggiorno:3, camera:4, bagnetto:5, balcone:6, studio:7, terrazzo:8 };
        if (staticRooms[slug]) return staticRooms[slug];
        return 1;
      })();

      var payload = {
        name: draft.name,
        room_id: rid,
        frequency_days: draft.everyDays || 0,
        assignment_type: draft.assignee === "both" ? "TOGETHER" : draft.assignee === 1 ? "FIXED_A" : "FIXED_B",
        difficulty: Math.round(draft.points/(scoring?.base || 10)) || 3,
        tags: draft.tags,
        scoring_base: scoring?.base || 10
      };
      if (draft.next_due_date) payload.next_due_date = draft.next_due_date;
      window.HS_API.updateTask(bid, payload, scope).then(function() {
        if (loadDataRef.current) loadDataRef.current();
      }).catch(function(e){ console.error('HS update fail',e); });
    }
    if (scope === 'this') {
      // scope=this non cambia la serie: non applichiamo il draft allo stato
      // locale persistente (name/room/difficulty restano quelli del task per
      // le occorrenze future). Il reload sopra applica l'override solo alla
      // prossima occorrenza, coerente con quanto fatto dal backend.
      setTaskDetail(null);
      showToast('Modifica applicata solo a questa occorrenza');
      return;
    }
    const next = tasks.map(t => (t.id === draft.id || t._backendId === bid) ? { ...t, ...draft } : t);
    setTasks(next);
    if (window.refreshInstances) window.refreshInstances(next);

    // Aggiorna anche le completion di oggi in locale
    const isBoth = draft.completedBy === 'both' || draft.assignee === 'both';
    const pts = (draft.difficulty || Math.round((draft.points || 0) / (scoring?.base || 3)) || 2) * (scoring?.base || 10);
    const newAwarded = (isBoth && scoring.splitShared) ? Math.ceil(pts / 2) : pts;

    const nextCompleted = completed.map(c => {
      const matchId = c._backendId === bid || c.id === draft.id || c.id === 't' + bid;
      if (matchId) {
        return { 
          ...c, 
          ...draft, 
          awardedPoints: newAwarded
        };
      }
      return c;
    });
    setCompleted(nextCompleted);

    setTaskDetail(null);
    showToast('Task aggiornato');
  }

  function handleCreateRoom(roomData) {
    var iconWithColor = (roomData.icon || 'Sofa') + (roomData.color ? ':' + roomData.color : '');
    window.HS_API.createRoom({ name: roomData.name, icon: iconWithColor })
      .then(function() {
        showToast(`Stanza "${roomData.name}" creata`);
        if (loadDataRef.current) loadDataRef.current();
      })
      .catch(function(e) {
        console.error('HS create room fail', e);
        showToast('Errore creazione stanza', 'error');
      });
  }

  function handleUpdateRoom(room) {
    const bid = room._backendId;
    if (bid) {
      var iconWithColor = (room.icon || 'Sofa') + (room.color ? ':' + room.color : '');
      window.HS_API.updateRoom(bid, { name: room.name, icon: iconWithColor })
        .then(function() {
          showToast('Stanza aggiornata');
          if (loadDataRef.current) loadDataRef.current();
        })
        .catch(function(e) {
          console.error('HS update room fail', e);
          showToast('Errore aggiornamento stanza', 'error');
        });
    }
  }

  function handleDeleteRoom(room) {
    const bid = room._backendId;
    if (bid) {
      if (confirm(`Eliminare la stanza "${room.name}"? Tutti i task associati rimarranno attivi.`)) {
        window.HS_API.deleteRoom(bid, true)
          .then(function() {
            showToast('Stanza eliminata', 'warning');
            if (loadDataRef.current) loadDataRef.current();
          })
          .catch(function(e) {
            console.error('HS delete room fail', e);
            showToast('Errore eliminazione stanza', 'error');
          });
      }
    }
  }

  function handleDeleteTask(task, scope) {
    scope = scope || 'all';
    var bid=task._backendId||parseInt(String(task.id).replace(/^t/,"",10));
    if(bid){ window.HS_API.deleteTask(bid, scope).catch(function(e){}); }
    if (scope === 'this') {
      // La serie resta attiva, solo la prossima occorrenza viene saltata:
      // ricarica dal backend invece di rimuovere il task dallo stato locale.
      if (loadDataRef.current) loadDataRef.current();
      setTaskDetail(null);
      showToast('Occorrenza saltata', 'warning');
      return;
    }
    const next = tasks.filter(t => t.id !== task.id);
    setTasks(next);
    if (window.refreshInstances) window.refreshInstances(next);
    setTaskDetail(null);
    showToast('Task eliminato', 'warning');
  }

  function handleSaveMember(updated) {
    setMembers(members.map(m => m.id === updated.id ? updated : m));
    const idx = MOCK.users.findIndex(u => u.id === updated.id);
    if (idx !== -1) MOCK.users[idx] = { ...MOCK.users[idx], ...updated };
    // Persisti su backend
    window.HS_API.patchUser(updated.id, { name: updated.name, emoji: updated.emoji, color: updated.color }).catch(function(e){});
    setMemberEdit(null);
    showToast('Profilo aggiornato');
  }

  async function handleReset() {
    if (confirm('Ripristinare tutti i dati di default? Verranno cancellati anche i dati sul server.')) {
      try { await window.HS_API.resetTest(); } catch(e) {}
      localStorage.removeItem(LS_KEY);
      window.location.reload();
    }
  }

  function navigate(tab) { setActiveTab(tab); setDrawer(false); }

  // ── Screen router ──
  // Note: screen component prop names must match lib/screens.jsx signatures exactly
  // La home mostra SOLO i completamenti di oggi: lo storico (90gg) resta
  // in HistoryScreen/ScoreScreen.
  const completedToday = completed.filter(c => {
    if (!c.completedAt) return false;
    return new Date(c.completedAt).toDateString() === new Date().toDateString();
  });
  function renderScreen() {
    switch (activeTab) {
      case 'today':
        return homeMode === 'channels'
          ? <HomeChannels
              tasks={tasks} tasksCompleted={completedToday}
              onComplete={handleComplete} onOpen={setTaskDetail}
              onGoToScore={() => navigate('score')}
              onSnooze={(t) => {}} // future
              cardVariant={cardVariant}
            />
          : <HomeDial
              tasks={tasks} tasksCompleted={completedToday}
              onComplete={handleComplete} onOpen={setTaskDetail}
              onGoToScore={() => navigate('score')}
              onSnooze={(t) => {}}
              cardVariant={cardVariant}
            />;
      case 'rooms':
        return <RoomsScreen tasks={tasks} completed={completed} rooms={rooms} onComplete={handleComplete} onOpen={setTaskDetail} />;
      case 'calendar':
        return <CalendarScreen tasks={tasks} onOpen={setTaskDetail} />;
      case 'score':
        return <ScoreScreen completed={completed} />;
      case 'history':
        return <HistoryScreen completed={completed} onOpen={setTaskDetail} onUndo={handleUncomplete} />;
      case 'settings':
        return <SettingsScreen
          vacation={vacation} setVacation={setVacation}
          rooms={rooms} setRooms={setRooms}
          scoring={scoring} setScoring={setScoring}
          members={members} setMembers={setMembers}
          onEditMember={setMemberEdit}
          notifyPrefs={notifyPrefs} setNotifyPrefs={setNotifyPrefs}
          prefs={prefs} setPrefs={setPrefs}
          notifSaveState={notifSaveState}
          onInvite={() => setInviteOpen(true)}
          onShowHistory={() => setActiveTab('history')}
          onReset={handleReset}
          tasks={tasks} completed={completed}
          onCreateRoom={handleCreateRoom}
          onUpdateRoom={handleUpdateRoom}
          onDeleteRoom={handleDeleteRoom}
          onCreateTask={handleAddTask}
          onUpdateTask={handleUpdateTask}
          onDeleteTask={handleDeleteTask}
        />;
      default: return null;
    }
  }

  // ── Header ──
  function Header() {
    return (
      <div style={{
        position: 'sticky', top: 0, zIndex: 30,
        background: HS.bg + 'EE',
        backdropFilter: 'blur(14px)', WebkitBackdropFilter: 'blur(14px)',
        borderBottom: `1px solid ${HS.hairline}`,
        padding: '10px 14px 8px',
        display: 'flex', alignItems: 'center', gap: 8,
      }}>
        <div style={{
          fontFamily: HS.fontDisplay, fontSize: 21, fontWeight: 500,
          letterSpacing: -0.5, color: HS.ink, flex: 1,
        }}>HomeSync</div>

        <button
          onClick={() => setDrawer(true)}
          aria-label="Apri menu"
          style={{
            border: 'none', background: HS.card, borderRadius: 10, padding: 8,
            boxShadow: HS.shadow.card,
          }}>
          <Icon name="menu" size={20} color={HS.ink2} strokeWidth={2} />
        </button>
      </div>
    );
  }

  // ── Pull-to-refresh ──
  // Custom: il CSS (overscroll-behavior:none) disabilita quello nativo del
  // browser, e nella PWA installata non esiste comunque. Trascina giù dal
  // top della lista -> ricarica i dati dal backend.
  const ptrScrollRef = React.useRef(null);
  const ptrTouch = React.useRef({ startY: 0, active: false });
  const [ptrPull, setPtrPull] = React.useState(0);
  const [ptrBusy, setPtrBusy] = React.useState(false);
  function ptrStart(e) {
    const el = ptrScrollRef.current;
    if (!el || el.scrollTop > 0 || ptrBusy) return;
    ptrTouch.current = { startY: e.touches[0].clientY, active: true };
  }
  function ptrMove(e) {
    const s = ptrTouch.current;
    const el = ptrScrollRef.current;
    if (!s.active || ptrBusy || !el || el.scrollTop > 0) return;
    const dy = e.touches[0].clientY - s.startY;
    setPtrPull(dy > 0 ? Math.min(90, dy * 0.45) : 0);
  }
  async function ptrEnd() {
    const wasActive = ptrTouch.current.active;
    ptrTouch.current = { startY: 0, active: false };
    if (!wasActive || ptrBusy) return;
    if (ptrPull >= 50) {
      setPtrBusy(true); setPtrPull(50);
      vibrate([10]);
      try { if (loadDataRef.current) await loadDataRef.current(); } catch (e) {}
      setTimeout(() => { setPtrBusy(false); setPtrPull(0); }, 350);
    } else {
      setPtrPull(0);
    }
  }

  // ── Shell ──
  const shell = (
    <div style={{
      position: 'relative', width: '100%', height: '100%',
      background: HS.bg, display: 'flex', flexDirection: 'column', overflow: 'hidden',
    }}>
      <Header />

      {/* Indicatore pull-to-refresh */}
      <div aria-hidden="true" style={{
        position: 'absolute', left: '50%', top: 54, zIndex: 35,
        transform: `translateX(-50%) translateY(${ptrPull - 44}px) rotate(${ptrPull * 4}deg)`,
        opacity: ptrPull > 8 ? 1 : 0,
        transition: ptrTouch.current.active ? 'none' : 'transform .25s ease, opacity .25s ease',
        width: 32, height: 32, borderRadius: '50%', background: '#fff',
        boxShadow: '0 2px 10px rgba(42,29,20,.18)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{
          width: 18, height: 18, borderRadius: '50%',
          border: `2.5px solid ${HS.hairline}`, borderTopColor: HS.primary,
          animation: ptrBusy ? 'hs-spin .7s linear infinite' : 'none',
        }} />
      </div>

      <div ref={ptrScrollRef}
        onTouchStart={ptrStart} onTouchMove={ptrMove}
        onTouchEnd={ptrEnd} onTouchCancel={ptrEnd}
        style={{ flex: 1, overflowY: 'auto', position: 'relative', WebkitOverflowScrolling: 'touch' }}>
        <ErrorBoundary key={activeTab}>
          {renderScreen()}
        </ErrorBoundary>
      </div>

      <BottomTabBar active={activeTab} onChange={navigate} onAdd={() => setQuickAdd(true)} />

      {/* Overlays */}
      <DrawerMenu
        open={drawer} onClose={() => setDrawer(false)}
        onNavigate={navigate} activeTab={activeTab}
        vacation={vacation} setVacation={setVacation}
      />
      {quickAdd && <QuickAddSheet open={quickAdd} onClose={() => setQuickAdd(false)} onCreate={handleAddTask} onComplete={handleComplete} rooms={rooms} scoring={scoring} />}
      {taskDetail && (
        <TaskDetailSheet
          open task={taskDetail}
          onClose={() => setTaskDetail(null)}
          onSave={handleSaveTask} onDelete={handleDeleteTask}
          onComplete={(t) => { handleComplete(t); setTaskDetail(null); }}
          onUncomplete={(t) => { handleUncomplete(t); setTaskDetail(null); }}
          rooms={rooms} completed={completed} scoring={scoring}
        />
      )}
      {whoDidIt && (
        <WhoDidItSheet
          open task={whoDidIt}
          onPick={(who) => doComplete(whoDidIt, who)}
          onClose={() => setWhoDidIt(null)}
        />
      )}
      {memberEdit && (
        <MemberEditSheet
          open member={memberEdit}
          onClose={() => setMemberEdit(null)}
          onSave={handleSaveMember}
        />
      )}
      {inviteOpen && <InviteSheet open onClose={() => setInviteOpen(false)} />}
    </div>
  );

  if (!sessionToken) {
    return <LoginScreen onLoginSuccess={(token) => {
      setSessionToken(token);
      // Ricarica subito i dati: il primo loadData è partito senza sessione
      // (tutte 401) e il polling da 30s lascerebbe la home vuota nel frattempo.
      if (loadDataRef.current) loadDataRef.current();
    }} />;
  }

  if (isDesktop) {
    return (
      <DesktopDashboard
        tasks={tasks} completed={completed}
        onComplete={handleComplete} onOpenTask={setTaskDetail}
        onAdd={() => setQuickAdd(true)}
        vacation={vacation} activeTab={activeTab} onNavigate={navigate}
      >
        {activeTab !== 'today' ? shell : undefined}
      </DesktopDashboard>
    );
  }

  return (
    <>
      {shell}
      {/* PWA install banner */}
      {showInstall && (
        <div id="hs-install-banner" role="complementary" aria-label="Installa HomeSync">
          <div class="hs-install-icon" aria-hidden="true">H</div>
          <div class="hs-install-text">
            <div class="hs-install-title">Installa HomeSync</div>
            <div class="hs-install-sub">Aggiungila alla home screen</div>
          </div>
          <button class="hs-install-btn" onClick={async () => {
            if (installPrompt) {
              installPrompt.prompt();
              const { outcome } = await installPrompt.userChoice;
              if (outcome === 'accepted') setShowInstall(false);
            }
          }}>Installa</button>
          <button class="hs-dismiss-btn" onClick={() => setShowInstall(false)} aria-label="Chiudi">×</button>
        </div>
      )}
    </>
  );
}

// ─── Root render ──────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ToastProvider>
    <ErrorBoundary>
      <App />
    </ErrorBoundary>
  </ToastProvider>
);
  </script>
</body>
</html>
