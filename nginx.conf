# HomeSync frontend — Nginx config
#
# - / → index.html (no-cache, così il runtime-config è sempre fresco)
# - /lib/ → asset statici, immutable cache
# - /api/ → reverse proxy verso il container backend
# - /health → liveness probe locale
#
# Esposto solo a 127.0.0.1:3100 dal compose; la TLS termina davanti
# (Caddy/Traefik/Nginx host).

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers (vedi security-headers.conf). Ripetuti in ogni location
  # con add_header proprio, perché nginx non li eredita in quel caso.
  include /etc/nginx/security-headers.conf;

  # gzip
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # MIME types: include la tabella standard nginx + aggiungi .jsx
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # index.html mai cachato
  location = /index.html {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires off;
  }

  # runtime-config.json → mai cachato (montato via volume Docker)
  location = /runtime-config.json {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store" always;
    expires off;
  }

  # File JSX: Content-Type text/babel richiesto da @babel/standalone
  # no-cache: filenames senza hash, cambiano ad ogni deploy
  location ~* \.jsx$ {
    include /etc/nginx/security-headers.conf;
    default_type text/babel;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires off;
  }

  # Asset lib/ — no-cache (nomi file senza hash, aggiornati ad ogni deploy)
  location /lib/ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires off;
    try_files $uri =404;
  }

  # Asset lib-bridge/ — no-cache
  location /lib-bridge/ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires off;
    try_files $uri =404;
  }

  # SSE endpoint: connessione long-lived, no buffering.
  # Deve stare PRIMA del block generico /api/ per avere precedenza.
  location = /api/events {
    proxy_pass http://homesync-api:8000/api/events;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    chunked_transfer_encoding on;
  }

  # Reverse proxy verso il backend FastAPI nel network compose.
  # Il frontend chiama /api/... e Nginx forwarda al servizio.
  location /api/ {
    proxy_pass http://homesync-api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
  }

  # Liveness locale
  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Service Worker — no-cache + header scope
  location = /sw.js {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Service-Worker-Allowed "/" always;
    expires off;
  }

  # PWA manifest
  location = /manifest.json {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires off;
  }

  # PWA icon
  location = /icon.svg {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=86400" always;
    expires 1d;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
